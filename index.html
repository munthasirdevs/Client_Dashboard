<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xenon OS | Premium Client Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        bg: '#0b0e14',
                        primary: '#007bff',
                        accent: '#00d2ff',
                    },
                    animation: {
                        'drift': 'drift 20s infinite linear',
                        'fade-in': 'fadeIn 1s ease-out',
                    },
                    keyframes: {
                        drift: {
                            '0%': { transform: 'rotate(0deg)' },
                            '100%': { transform: 'rotate(360deg)' },
                        },
                        fadeIn: {
                            'from': { opacity: '0', transform: 'translateY(20px)' },
                            'to': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-bg text-white flex items-center justify-center min-h-screen overflow-hidden relative">
    <!-- Animated Background Gradients -->
    <div class="absolute inset-0 -z-10 animate-drift">
        <div class="absolute inset-0 bg-[radial-gradient(circle,rgba(0,123,255,0.1)_0%,transparent_50%)]"></div>
        <div class="absolute inset-0 bg-[radial-gradient(circle,rgba(0,210,255,0.05)_0%,transparent_50%)]"></div>
    </div>

    <div
        class="text-center p-12 bg-white/5 backdrop-blur-md border border-white/10 rounded-3xl shadow-2xl max-w-2xl w-[90%] animate-fade-in">
        <h1 class="text-5xl font-bold mb-6 bg-gradient-to-r from-white to-accent bg-clip-text text-transparent">
            Welcome to Xenon OS
        </h1>
        <p class="text-lg text-white/70 mb-10 leading-relaxed">
            Experience the future of client management. A seamless, powerful, and secure dashboard designed for modern
            workflows.
        </p>
        <a href="./pages/dashboard.html"
            class="inline-block px-10 py-4 font-semibold text-white bg-gradient-to-r from-primary to-accent rounded-xl shadow-lg shadow-primary/30 transition-all duration-300 hover:-translate-y-1 hover:shadow-xl hover:shadow-primary/50 relative overflow-hidden group">
            <span class="relative z-10">Explore Dashboard</span>
            <span
                class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-500"></span>
        </a>
        <div class="mt-12 text-xs text-white/30 uppercase tracking-widest">
            Xenon Studios &copy; 2026
        </div>
    </div>
</body>

</html>
